name: Build iOS

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build ios --release --no-codesign --build-number=${{ github.run_number }} --dart-define=GIT_SHA=${{ github.sha }}
      - name: Package app
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r "$GITHUB_WORKSPACE/KNX-Monitor-iOS.ipa" Payload
      - uses: actions/upload-artifact@v4
        with:
          name: KNX-Monitor-iOS
          path: KNX-Monitor-iOS.ipa
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: KNX-Monitor-iOS.ipa
