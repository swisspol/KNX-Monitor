name: Build macOS

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build macos --release --build-number=${{ github.run_number }} --dart-define=GIT_SHA=${{ github.sha }}
      - name: Package app
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/KNX-Monitor-macOS.zip" "KNX Monitor.app"
      - uses: actions/upload-artifact@v4
        with:
          name: KNX-Monitor-macOS
          path: KNX-Monitor-macOS.zip
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: KNX-Monitor-macOS.zip
