name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build windows --release --build-number=${{ github.run_number }} --dart-define=GIT_SHA=${{ github.sha }}
      - name: Package app
        run: Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath KNX-Monitor-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: KNX-Monitor-Windows
          path: KNX-Monitor-Windows.zip
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: KNX-Monitor-Windows.zip
