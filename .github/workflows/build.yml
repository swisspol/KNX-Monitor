name: Build macOS

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build macos --release --build-number=${{ github.run_number }}
      - uses: actions/upload-artifact@v4
        with:
          name: KNX-Monitor-macOS
          path: build/macos/Build/Products/Release
